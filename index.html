<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCartBD | Premium Online Shopping</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .top-bar{
            background:#ff6600;
            color:#fff;
            text-align:center;
            padding:8px;
            font-size:14px;
            font-weight:600;
        }

        .navbar{
            background:#fff;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .logo{
            font-size:30px;
            font-weight:800;
            color:#ff6600;
        }

        .search-box input{
            width:100%;
            padding:12px;
            border:2px solid #eee;
            border-radius:10px;
            outline:none;
        }

        .hero{
            background:linear-gradient(135deg,#ff6600,#ff9900);
            color:#fff;
            padding:80px 30px;
            border-radius:20px;
            margin-top:20px;
        }

        .btn{
            background:#fff;
            color:#ff6600;
            padding:12px 25px;
            border-radius:10px;
            font-weight:bold;
            margin-top:20px;
            display:inline-block;
        }

        .product-card{
            background:#fff;
            border-radius:15px;
            overflow:hidden;
            transition:.3s;
        }

        .product-card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 30px rgba(0,0,0,.1);
        }

        .price{
            color:#ff6600;
            font-size:22px;
            font-weight:700;
        }

        .old{
            text-decoration:line-through;
            color:#999;
            font-size:14px;
        }

        .buy-btn{
            background:#ff6600;
            color:#fff;
            padding:10px;
            width:100%;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="top-bar">
🔥 Free Delivery Over 999 Tk
</div>

<nav class="navbar">

<div class="max-w-7xl mx-auto flex items-center justify-between p-4">

<h1 class="logo">
NexCartBD
</h1>

<div class="search-box w-1/2">
<input
type="text"
placeholder="Search Products...">
</div>

<div class="flex gap-6 text-xl">

🛒

❤️

👤

</div>

</div>

</nav>

<div class="max-w-7xl mx-auto p-5">

<div class="hero">

<h2 class="text-5xl font-bold">
Mega Sale 2026
</h2>

<p class="mt-5 text-xl">
Up To 70% OFF
On Premium Gadgets
</p>

<a class="btn">
Shop Now
</a>

</div>

<h2 class="text-3xl font-bold mt-10 mb-6">
Featured Products
</h2>

<div class="grid md:grid-cols-4 gap-6">

<div class="product-card">

<img
src="https://picsum.photos/400/400"
class="w-full">

<div class="p-5">

<h3 class="font-bold text-lg">
Wireless Earbuds
</h3>

<div class="mt-2">

<span class="price">
৳1290
</span>

<span class="old">
৳1790
</span>

</div>

<button class="buy-btn mt-4">
Buy Now
</button>

</div>

</div>
